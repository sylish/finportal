<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wealth Management Portal</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
      color: #fff;
    }
    #root { min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 40px; height: 40px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header-title { font-size: 28px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .timestamp { font-size: 12px; color: #9ca3af; }

    .btn { padding: 10px 16px; border: none; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { background: transparent; border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; padding: 6px 10px; border-radius: 8px; }
    .btn-icon:hover { background: rgba(99,102,241,0.15); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: linear-gradient(145deg, rgba(30,27,75,0.5), rgba(15,23,42,0.5));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 14px;
      padding: 20px;
      transition: all 0.3s;
    }
    .stat-card:hover { transform: translateY(-4px); border-color: rgba(99,102,241,0.5); }
    .stat-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; font-weight: 600; }
    .stat-value { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .stat-sub { font-size: 12px; color: #6b7280; }

    .section {
      background: linear-gradient(145deg, rgba(30,27,75,0.4), rgba(15,23,42,0.4));
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 28px;
    }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .section-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }

    table { width: 100%; border-collapse: collapse; }
    thead { background: rgba(0,0,0,0.3); }
    th {
      text-align: left;
      padding: 14px;
      font-size: 12px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(99,102,241,0.2);
      letter-spacing: 0.3px;
    }
    td { padding: 14px; border-bottom: 1px solid rgba(99,102,241,0.1); }
    tbody tr:hover { background: rgba(99,102,241,0.06); }
    .text-right { text-align: right; }

    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin: 6px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 4px;
      transition: width 0.3s;
    }

    .portfolio-card {
      background: linear-gradient(145deg, rgba(40,37,95,0.5), rgba(20,30,48,0.5));
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .portfolio-card:hover { border-color: rgba(99,102,241,0.5); background: linear-gradient(145deg, rgba(50,47,115,0.5), rgba(30,40,68,0.5)); }
    .portfolio-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .portfolio-info { flex: 1; }
    .portfolio-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .portfolio-desc { font-size: 12px; color: #9ca3af; }
    .portfolio-amount { font-size: 20px; font-weight: 700; text-align: right; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 50; }
    .modal.show { display: flex; align-items: center; justify-content: center; }
    .modal-content {
      background: linear-gradient(145deg, #1e1b4b 0%, #0f172a 100%);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 16px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header { padding: 24px; border-bottom: 1px solid rgba(99,102,241,0.2); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 20px; font-weight: 700; }
    .modal-body { padding: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #d1d5db; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
    .input-field { width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #fff; font-size: 14px; font-family: inherit; transition: all 0.2s; }
    .input-field:focus { outline: none; border-color: rgba(99,102,241,0.6); background: rgba(255,255,255,0.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    .badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; background: rgba(99,102,241,0.2); color: #a5b4fc; text-transform: uppercase; }

    .actions { display: flex; gap: 6px; }
    .empty-state { text-align: center; padding: 48px 20px; color: #6b7280; }

    .total-row { background: rgba(99,102,241,0.1); font-weight: 700; }

    @media print {
      body { background: white; color: black; }
      .header-right { display: none; }
      .modal { display: none !important; }
    }

    @media (max-width: 1024px) {
      .form-row-3 { grid-template-columns: 1fr 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 768px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
      .portfolio-header { flex-direction: column; align-items: flex-start; }
      .portfolio-amount { text-align: left; }
      th, td { padding: 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useMemo } = React;
    const e = React.createElement;

    const fmt = n => "₹" + Number(n).toLocaleString("en-IN");
    const loadData = (key, fallback) => { try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; } catch { return fallback; } };

    const investmentTypes = ["Savings Account", "Fixed Deposit", "ULIP", "Mutual Fund", "Stocks", "Employee Provident Fund", "Public Provident Fund", "Sukanya Samridhi", "Gratuity", "Physical Gold", "ETF", "House/Apartment", "Car", "Two Wheeler", "Other"];

    const defaultPortfolios = [
      {
        id: 1,
        bankName: "SBI Bank",
        userName: "Sylish Kumar",
        investments: [
          { id: 1, type: "Savings Account", name: "Primary Savings", amount: 85000 },
          { id: 2, type: "Fixed Deposit", name: "3-Year FD", amount: 600000 }
        ]
      },
      {
        id: 2,
        bankName: "HDFC Bank",
        userName: "Sylish Kumar",
        investments: [
          { id: 1, type: "Mutual Fund", name: "HDFC Equity Fund", amount: 200000 },
          { id: 2, type: "Stocks", name: "Blue Chip Stocks", amount: 2550000 }
        ]
      },
      {
        id: 3,
        bankName: "ICICI Insurance",
        userName: "Sylish Kumar",
        investments: [
          { id: 1, type: "ULIP", name: "ICICI ULIPs", amount: 340000 }
        ]
      },
      {
        id: 4,
        bankName: "",
        userName: "Personal Assets",
        investments: [
          { id: 1, type: "Physical Gold", name: "Gold Ornaments", amount: 150000 },
          { id: 2, type: "House/Apartment", name: "Residential Property", amount: 3500000 }
        ]
      },
      {
        id: 5,
        bankName: "",
        userName: "Retirement Savings",
        investments: [
          { id: 1, type: "Employee Provident Fund", name: "EPF Account", amount: 450000 }
        ]
      }
    ];

    function App() {
      const [portfolios, setPortfolios] = useState(() => loadData("wealth_portfolios", defaultPortfolios));
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({});
      const [investForm, setInvestForm] = useState({});
      const [editId, setEditId] = useState(null);
      const [editInvId, setEditInvId] = useState(null);
      const [activePortfolioId, setActivePortfolioId] = useState(null);
      const [expandedPortfolio, setExpandedPortfolio] = useState(null);
      const [lastSaved, setLastSaved] = useState(new Date());
      const [portfolioSort, setPortfolioSort] = useState("bankName");
      const [summarySort, setSummarySort] = useState("amount");

      useEffect(() => { localStorage.setItem("wealth_portfolios", JSON.stringify(portfolios)); }, [portfolios]);

      const stats = useMemo(() => {
        const allInvestments = portfolios.flatMap(p => p.investments);
        const total = allInvestments.reduce((s, i) => s + i.amount, 0);
        const byType = {};
        allInvestments.forEach(i => {
          if (!byType[i.type]) byType[i.type] = { amount: 0, count: 0 };
          byType[i.type].amount += i.amount;
          byType[i.type].count += 1;
        });
        return { total, byType, allInvestments };
      }, [portfolios]);

      const addPortfolio = () => {
        if (!form.bankName || !form.userName) return;
        setPortfolios(p => [...p, { id: Date.now(), ...form, investments: [] }]);
        setForm({});
        setModal(null);
        setLastSaved(new Date());
      };

      const updatePortfolio = () => {
        setPortfolios(p => p.map(x => x.id === editId ? { ...x, bankName: form.bankName, userName: form.userName } : x));
        setForm({});
        setEditId(null);
        setModal(null);
        setLastSaved(new Date());
      };

      const deletePortfolio = id => {
        if (confirm("Delete this portfolio?")) {
          setPortfolios(p => p.filter(x => x.id !== id));
          setLastSaved(new Date());
        }
      };

      const addInvestment = () => {
        if (!investForm.name || !investForm.type || !investForm.amount) return;
        setPortfolios(p => p.map(x => x.id === activePortfolioId ? { ...x, investments: [...x.investments, { id: Date.now(), ...investForm }] } : x));
        setInvestForm({});
        setModal(null);
        setLastSaved(new Date());
      };

      const updateInvestment = () => {
        setPortfolios(p => p.map(x => x.id === activePortfolioId ? { ...x, investments: x.investments.map(i => i.id === editInvId ? { ...i, ...investForm } : i) } : x));
        setInvestForm({});
        setEditInvId(null);
        setModal(null);
        setLastSaved(new Date());
      };

      const deleteInvestment = (portId, invId) => {
        setPortfolios(p => p.map(x => x.id === portId ? { ...x, investments: x.investments.filter(i => i.id !== invId) } : x));
      };

      const exportData = () => {
        const data = JSON.stringify({ portfolios, exportDate: new Date().toISOString() }, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `wealth-backup-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert("✅ Data exported successfully!");
      };

      const importData = () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.onchange = ev => {
          const file = ev.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = e => {
            try {
              const d = JSON.parse(e.target.result);
              if (d.portfolios && Array.isArray(d.portfolios)) {
                setPortfolios(d.portfolios);
                setLastSaved(new Date());
                alert("✅ Data imported successfully!");
              } else {
                alert("❌ Invalid file format.");
              }
            } catch (err) {
              alert("❌ Error importing file.");
            }
          };
          reader.readAsText(file);
        };
        input.click();
      };

      const typeBreakdown = useMemo(() => {
        let breakdown = Object.entries(stats.byType).map(([type, data]) => ({
          type,
          amount: data.amount,
          count: data.count,
          percentage: stats.total ? ((data.amount / stats.total) * 100).toFixed(1) : 0
        }));

        if (summarySort === "amount") breakdown.sort((a, b) => b.amount - a.amount);
        else if (summarySort === "type") breakdown.sort((a, b) => a.type.localeCompare(b.type));
        else if (summarySort === "percentage") breakdown.sort((a, b) => b.percentage - a.percentage);

        return breakdown;
      }, [stats.byType, stats.total, summarySort]);

      const sortedPortfolios = useMemo(() => {
        let sorted = [...portfolios.map(p => {
          const portTotal = p.investments.reduce((s, i) => s + i.amount, 0);
          return { ...p, total: portTotal };
        })];

        if (portfolioSort === "bankName") {
          // Separate banks from non-banks
          const banks = sorted.filter(p => p.bankName && String(p.bankName).trim() !== "");
          const nonBanks = sorted.filter(p => !p.bankName || String(p.bankName).trim() === "");

          // Sort banks alphabetically
          banks.sort((a, b) => String(a.bankName || "").localeCompare(String(b.bankName || "")));
          // Sort non-banks by user name
          nonBanks.sort((a, b) => String(a.userName || "").localeCompare(String(b.userName || "")));

          // Combine: banks first, then non-banks
          sorted = [...banks, ...nonBanks];
        }
        else if (portfolioSort === "userName") {
          sorted.sort((a, b) => String(a.userName || "").localeCompare(String(b.userName || "")));
        }
        else if (portfolioSort === "amount") {
          sorted.sort((a, b) => b.total - a.total);
        }

        return sorted;
      }, [portfolios, portfolioSort]);

      const timeStr = lastSaved.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });

      return e("div", null,
        e("div", { className: "container" },
          // HEADER
          e("div", { className: "header" },
            e("div", { className: "header-left" },
              e("div", { className: "header-logo" }, "💰"),
              e("h1", { className: "header-title" }, "Wealth Management Portal")
            ),
            e("div", { className: "header-right" },
              e("span", { className: "timestamp" }, `Saved at ${timeStr}`),
              e("button", { className: "btn btn-secondary btn-sm", onClick: () => window.print() }, "🖨️ Print"),
              e("button", { className: "btn btn-secondary btn-sm", onClick: () => setModal("backup") }, "📥 Backup"),
              e("button", { className: "btn btn-primary btn-sm", onClick: () => { setForm({ bankName: "", userName: "" }); setEditId(null); setModal("addPortfolio"); } }, "+ Add Portfolio")
            )
          ),

          // SUMMARY STATS
          e("div", { className: "stats-grid" },
            e("div", { className: "stat-card" },
              e("div", { className: "stat-label" }, "💵 Total Wealth"),
              e("div", { className: "stat-value" }, fmt(stats.total)),
              e("div", { className: "stat-sub" }, portfolios.length + " portfolios")
            ),
            e("div", { className: "stat-card" },
              e("div", { className: "stat-label" }, "🏦 Active Portfolios"),
              e("div", { className: "stat-value" }, portfolios.length),
              e("div", { className: "stat-sub" }, stats.allInvestments.length + " investments")
            ),
            e("div", { className: "stat-card" },
              e("div", { className: "stat-label" }, "📈 Top Category"),
              e("div", { className: "stat-value" }, typeBreakdown.length > 0 ? typeBreakdown[0].type : "N/A"),
              e("div", { className: "stat-sub" }, typeBreakdown.length > 0 ? fmt(typeBreakdown[0].amount) : "No data")
            ),
            e("div", { className: "stat-card" },
              e("div", { className: "stat-label" }, "📊 Avg Portfolio"),
              e("div", { className: "stat-value" }, fmt(portfolios.length > 0 ? stats.total / portfolios.length : 0)),
              e("div", { className: "stat-sub" }, "Per portfolio")
            )
          ),

          // EXECUTIVE SUMMARY - BY INVESTMENT TYPE
          e("div", { className: "section" },
            e("div", { className: "section-header" },
              e("h2", { className: "section-title" }, "📊 Executive Summary - Investment Types"),
              e("select", { className: "input-field", value: summarySort, onChange: ev => setSummarySort(ev.target.value), style: { width: "200px" } },
                e("option", { value: "amount" }, "Sort by Amount"),
                e("option", { value: "type" }, "Sort by Type"),
                e("option", { value: "percentage" }, "Sort by Percentage")
              )
            ),
            e("table", null,
              e("thead", null,
                e("tr", null,
                  e("th", null, "Investment Type"),
                  e("th", { className: "text-right" }, "Amount (₹)"),
                  e("th", null, "% of Total"),
                  e("th", { className: "text-right" }, "Count")
                )
              ),
              e("tbody", null,
                typeBreakdown.map(t =>
                  e("tr", { key: t.type },
                    e("td", null, t.type),
                    e("td", { className: "text-right" }, fmt(t.amount)),
                    e("td", null,
                      e("div", { className: "progress-bar" },
                        e("div", { className: "progress-fill", style: { width: t.percentage + "%" } })
                      ),
                      e("span", null, t.percentage + "%")
                    ),
                    e("td", { className: "text-right" }, t.count)
                  )
                ),
                e("tr", { className: "total-row" },
                  e("td", null, "TOTAL"),
                  e("td", { className: "text-right" }, fmt(stats.total)),
                  e("td", null, "100%"),
                  e("td", { className: "text-right" }, stats.allInvestments.length)
                )
              )
            )
          ),

          // PORTFOLIOS SECTION
          e("div", { className: "section" },
            e("div", { className: "section-header" },
              e("h2", { className: "section-title" }, "🏦 Portfolios & Investments"),
              e("select", { className: "input-field", value: portfolioSort, onChange: ev => setPortfolioSort(ev.target.value), style: { width: "200px" } },
                e("option", { value: "bankName" }, "Sort by Bank Name"),
                e("option", { value: "userName" }, "Sort by User Name"),
                e("option", { value: "amount" }, "Sort by Amount")
              )
            ),
            sortedPortfolios.length > 0 ? sortedPortfolios.map(portfolio => {
              const portTotal = portfolio.investments.reduce((s, i) => s + i.amount, 0);
              return e("div", { key: portfolio.id },
                e("div", { className: "portfolio-card", onClick: () => setExpandedPortfolio(expandedPortfolio === portfolio.id ? null : portfolio.id) },
                  e("div", { className: "portfolio-header" },
                    e("div", { className: "portfolio-info" },
                      e("div", { className: "portfolio-name" }, portfolio.bankName),
                      e("div", { className: "portfolio-desc" }, "User: " + portfolio.userName + " • " + portfolio.investments.length + " investments")
                    ),
                    e("div", { className: "portfolio-amount" }, fmt(portTotal))
                  ),
                  expandedPortfolio === portfolio.id ? e("div", { style: { marginTop: 16, paddingTop: 16, borderTop: "1px solid rgba(99,102,241,0.2)" } },
                    e("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 16 } },
                      e("h4", { style: { fontSize: 13, fontWeight: 600, color: "#d1d5db", textTransform: "uppercase" } }, "Investments"),
                      e("button", { className: "btn btn-primary btn-sm", onClick: ev => { ev.stopPropagation(); setActivePortfolioId(portfolio.id); setInvestForm({}); setEditInvId(null); setModal("addInvestment"); } }, "+ Add")
                    ),
                    e("table", null,
                      e("thead", null,
                        e("tr", null,
                          e("th", null, "Investment Name"),
                          e("th", null, "Type"),
                          e("th", { className: "text-right" }, "Amount (₹)"),
                          e("th", null, "Actions")
                        )
                      ),
                      e("tbody", null,
                        portfolio.investments.length > 0 ? portfolio.investments.map(inv =>
                          e("tr", { key: inv.id },
                            e("td", null, inv.name),
                            e("td", null, e("span", { className: "badge" }, inv.type)),
                            e("td", { className: "text-right" }, fmt(inv.amount)),
                            e("td", null,
                              e("div", { className: "actions" },
                                e("button", { className: "btn btn-icon btn-sm", onClick: ev => { ev.stopPropagation(); setActivePortfolioId(portfolio.id); setInvestForm(inv); setEditInvId(inv.id); setModal("editInvestment"); } }, "✏️"),
                                e("button", { className: "btn btn-icon btn-sm", onClick: ev => { ev.stopPropagation(); deleteInvestment(portfolio.id, inv.id); } }, "🗑️")
                              )
                            )
                          )
                        ) : e("tr", null, e("td", { colSpan: 4, style: { textAlign: "center", color: "#6b7280", padding: "16px" } }, "No investments"))
                      )
                    ),
                    e("div", { style: { display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 12 } },
                      e("button", { className: "btn btn-secondary btn-sm", onClick: ev => { ev.stopPropagation(); setForm({ bankName: portfolio.bankName, userName: portfolio.userName }); setEditId(portfolio.id); setModal("editPortfolio"); } }, "✏️ Edit"),
                      e("button", { className: "btn btn-secondary btn-sm", onClick: ev => { ev.stopPropagation(); deletePortfolio(portfolio.id); } }, "🗑️ Delete")
                    )
                  ) : null
                )
              );
            }) : e("div", { className: "empty-state" },
              e("div", { style: { fontSize: 48, marginBottom: 16 } }, "🏦"),
              e("h3", { style: { fontSize: 18, fontWeight: 600, color: "#d1d5db", marginBottom: 8 } }, "No Portfolios Yet"),
              e("p", { style: { marginBottom: 24 } }, "Create your first portfolio to start tracking"),
              e("button", { className: "btn btn-primary", onClick: () => { setForm({ bankName: "", userName: "" }); setModal("addPortfolio"); } }, "+ Add Portfolio")
            )
          )
        ),

        // MODALS
        modal === "addPortfolio" ? e("div", { className: "modal show" },
          e("div", { className: "modal-content", onClick: ev => ev.stopPropagation() },
            e("div", { className: "modal-header" },
              e("h3", null, "Add Portfolio"),
              e("button", { className: "btn btn-secondary btn-sm", onClick: () => setModal(null) }, "✕")
            ),
            e("div", { className: "modal-body" },
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Bank / Institution Name"),
                e("input", { className: "input-field", placeholder: "e.g. SBI Bank, HDFC, ICICI Insurance", value: form.bankName || "", onChange: ev => setForm({ ...form, bankName: ev.target.value }) })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Account Holder Name"),
                e("input", { className: "input-field", placeholder: "Your name", value: form.userName || "", onChange: ev => setForm({ ...form, userName: ev.target.value }) })
              ),
              e("div", { style: { display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 24 } },
                e("button", { className: "btn btn-secondary", onClick: () => setModal(null) }, "Cancel"),
                e("button", { className: "btn btn-primary", onClick: addPortfolio }, "Add Portfolio")
              )
            )
          )
        ) : null,

        modal === "editPortfolio" ? e("div", { className: "modal show" },
          e("div", { className: "modal-content", onClick: ev => ev.stopPropagation() },
            e("div", { className: "modal-header" },
              e("h3", null, "Edit Portfolio"),
              e("button", { className: "btn btn-secondary btn-sm", onClick: () => setModal(null) }, "✕")
            ),
            e("div", { className: "modal-body" },
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Bank / Institution Name"),
                e("input", { className: "input-field", value: form.bankName || "", onChange: ev => setForm({ ...form, bankName: ev.target.value }) })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Account Holder Name"),
                e("input", { className: "input-field", value: form.userName || "", onChange: ev => setForm({ ...form, userName: ev.target.value }) })
              ),
              e("div", { style: { display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 24 } },
                e("button", { className: "btn btn-secondary", onClick: () => setModal(null) }, "Cancel"),
                e("button", { className: "btn btn-primary", onClick: updatePortfolio }, "Save Changes")
              )
            )
          )
        ) : null,

        modal === "addInvestment" ? e("div", { className: "modal show" },
          e("div", { className: "modal-content", onClick: ev => ev.stopPropagation() },
            e("div", { className: "modal-header" },
              e("h3", null, "Add Investment"),
              e("button", { className: "btn btn-secondary btn-sm", onClick: () => setModal(null) }, "✕")
            ),
            e("div", { className: "modal-body" },
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Investment Name"),
                e("input", { className: "input-field", placeholder: "e.g. Primary Savings, 3-Year FD", value: investForm.name || "", onChange: ev => setInvestForm({ ...investForm, name: ev.target.value }) })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Investment Type"),
                e("select", { className: "input-field", value: investForm.type || "", onChange: ev => setInvestForm({ ...investForm, type: ev.target.value }) },
                  e("option", { value: "" }, "Select type"),
                  investmentTypes.map(t => e("option", { key: t, value: t }, t))
                )
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Amount (₹)"),
                e("input", { className: "input-field", type: "number", placeholder: "0", value: investForm.amount || "", onChange: ev => setInvestForm({ ...investForm, amount: +ev.target.value }) })
              ),
              e("div", { style: { display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 24 } },
                e("button", { className: "btn btn-secondary", onClick: () => setModal(null) }, "Cancel"),
                e("button", { className: "btn btn-primary", onClick: addInvestment }, "Add Investment")
              )
            )
          )
        ) : null,

        modal === "editInvestment" ? e("div", { className: "modal show" },
          e("div", { className: "modal-content", onClick: ev => ev.stopPropagation() },
            e("div", { className: "modal-header" },
              e("h3", null, "Edit Investment"),
              e("button", { className: "btn btn-secondary btn-sm", onClick: () => setModal(null) }, "✕")
            ),
            e("div", { className: "modal-body" },
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Investment Name"),
                e("input", { className: "input-field", value: investForm.name || "", onChange: ev => setInvestForm({ ...investForm, name: ev.target.value }) })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Investment Type"),
                e("select", { className: "input-field", value: investForm.type || "", onChange: ev => setInvestForm({ ...investForm, type: ev.target.value }) },
                  investmentTypes.map(t => e("option", { key: t, value: t }, t))
                )
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Amount (₹)"),
                e("input", { className: "input-field", type: "number", value: investForm.amount || "", onChange: ev => setInvestForm({ ...investForm, amount: +ev.target.value }) })
              ),
              e("div", { style: { display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 24 } },
                e("button", { className: "btn btn-secondary", onClick: () => setModal(null) }, "Cancel"),
                e("button", { className: "btn btn-primary", onClick: updateInvestment }, "Save Changes")
              )
            )
          )
        ) : null,

        modal === "backup" ? e("div", { className: "modal show" },
          e("div", { className: "modal-content", onClick: ev => ev.stopPropagation() },
            e("div", { className: "modal-header" },
              e("h3", null, "📥 Backup & Sync Data"),
              e("button", { className: "btn btn-secondary btn-sm", onClick: () => setModal(null) }, "✕")
            ),
            e("div", { className: "modal-body" },
              e("div", { style: { marginBottom: 24 } },
                e("h4", { style: { fontSize: 14, fontWeight: 600, marginBottom: 12 } }, "Export Your Data"),
                e("p", { style: { fontSize: 13, color: "#9ca3af", marginBottom: 16 } },
                  "Download all your portfolio data as a JSON file. Use this to backup your data or transfer it to another device."
                ),
                e("button", { className: "btn btn-primary", onClick: () => { exportData(); setModal(null); } }, "📥 Export Data Now")
              ),
              e("div", { style: { borderTop: "1px solid rgba(99,102,241,0.2)", paddingTop: 24 } },
                e("h4", { style: { fontSize: 14, fontWeight: 600, marginBottom: 12 } }, "Import Data"),
                e("p", { style: { fontSize: 13, color: "#9ca3af", marginBottom: 16 } },
                  "Upload a previously exported JSON file to restore your portfolio data. This will replace your current data."
                ),
                e("button", { className: "btn btn-secondary", onClick: importData }, "📤 Import Data")
              ),
              e("div", { style: { marginTop: 24, padding: 16, background: "rgba(99,102,241,0.1)", borderRadius: 10, borderLeft: "3px solid #6366f1" } },
                e("p", { style: { fontSize: 12, color: "#d1d5db", lineHeight: "1.6" } },
                  "💡 Pro Tip: Export your data regularly to keep backups. You can import your data on any device by uploading the JSON file."
                )
              )
            )
          )
        ) : null
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wealth Management Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1419;
      color: #fff;
    }
    #root { min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-title { font-size: 24px; font-weight: 600; }
    .check-icon { color: #10b981; font-size: 20px; }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .timestamp { font-size: 12px; color: #9ca3af; }

    .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 12px;
      padding: 20px;
      background: rgba(30,27,75,0.4);
    }
    .stat-label { font-size: 12px; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
    .stat-value { font-size: 24px; font-weight: 700; }

    .section {
      background: rgba(30,27,75,0.6);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    table { width: 100%; border-collapse: collapse; }
    thead { background: rgba(0,0,0,0.3); }
    th {
      text-align: left;
      padding: 12px;
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(99,102,241,0.2);
    }
    td { padding: 14px 12px; border-bottom: 1px solid rgba(99,102,241,0.1); }
    tbody tr:hover { background: rgba(99,102,241,0.05); }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin: 4px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 3px;
    }

    .amount { text-align: right; font-weight: 500; }
    .percentage { text-align: right; font-size: 12px; color: #9ca3af; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; }
    .modal.show { display: flex; align-items: center; justify-content: center; }
    .modal-content {
      background: #1e1b4b;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header { padding: 20px; border-bottom: 1px solid rgba(99,102,241,0.2); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: #d1d5db; margin-bottom: 6px; }
    .input-field { width: 100%; padding: 10px 12px; border-radius: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 14px; }
    .input-field:focus { outline: none; border-color: rgba(99,102,241,0.6); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .action-buttons { display: flex; gap: 8px; }
    .btn-sm { padding: 6px 10px; font-size: 11px; }

    .empty-state { text-align: center; padding: 40px; color: #6b7280; }

    @media print {
      body { background: white; color: black; }
      .header-right { display: none; }
      .btn { display: none; }
      .modal { display: none !important; }
    }

    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; }
      table { font-size: 12px; }
      th, td { padding: 8px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useMemo } = React;
    const e = React.createElement;

    const fmt = n => "₹" + Number(n).toLocaleString("en-IN");
    const loadData = (key, fallback) => { try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; } catch { return fallback; } };

    const defaultAssets = [
      { id: 1, category: "Liquid cash", amount: 85000, account: "Savings Account", remarks: "Emergency fund" },
      { id: 2, category: "Fixed Deposits", amount: 600000, account: "SBI FD", remarks: "3-year tenure" },
      { id: 3, category: "Mutual Funds", amount: 200000, account: "HDFC Equity Fund", remarks: "Regular investment" },
      { id: 4, category: "Insurance (ULIPs)", amount: 340000, account: "ICICI ULIPs", remarks: "Protection + Growth" },
      { id: 5, category: "Public Provident Funds & Sukanya Samriddhi", amount: 885000, account: "PPF Account", remarks: "Tax-free growth" },
      { id: 6, category: "Stocks", amount: 2550000, account: "HDFC, TCS, Infosys", remarks: "Blue chip stocks" },
      { id: 7, category: "Provident Fund", amount: 1140000, account: "EPF Account", remarks: "Retirement corpus" },
      { id: 8, category: "Gratuity & Leave encashment", amount: 160000, account: "Accrued benefits", remarks: "Employer benefits" },
      { id: 9, category: "Gold assets", amount: 972000, account: "Physical Gold", remarks: "Safe deposit locker" },
      { id: 10, category: "Property and Vehicles", amount: 3170000, account: "Primary residence + Car", remarks: "Personal assets" }
    ];

    function App() {
      const [assets, setAssets] = useState(() => loadData("wealth_assets", defaultAssets));
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({});
      const [editId, setEditId] = useState(null);
      const [lastSaved, setLastSaved] = useState(new Date());

      useEffect(() => { localStorage.setItem("wealth_assets", JSON.stringify(assets)); }, [assets]);

      const totalWorth = useMemo(() => assets.reduce((s, a) => s + a.amount, 0), [assets]);

      const categoryBreakdown = useMemo(() => {
        const map = {};
        assets.forEach(a => {
          if (!map[a.category]) map[a.category] = 0;
          map[a.category] += a.amount;
        });
        return Object.entries(map).map(([cat, amt]) => ({
          category: cat,
          amount: amt,
          percentage: totalWorth ? ((amt / totalWorth) * 100).toFixed(1) : 0
        })).sort((a, b) => b.amount - a.amount);
      }, [assets, totalWorth]);

      const liquidAssets = useMemo(() =>
        assets.filter(a => ["Liquid cash", "Fixed Deposits", "Mutual Funds"].includes(a.category))
          .reduce((s, a) => s + a.amount, 0), [assets]);

      const physicalAssets = useMemo(() =>
        assets.filter(a => ["Gold assets", "Property and Vehicles"].includes(a.category))
          .reduce((s, a) => s + a.amount, 0), [assets]);

      const addAsset = () => {
        if (!form.category || !form.amount) return;
        setAssets(prev => [...prev, { id: Date.now(), ...form }]);
        setForm({});
        setModal(null);
        setLastSaved(new Date());
      };

      const updateAsset = () => {
        setAssets(prev => prev.map(a => a.id === editId ? { ...a, ...form } : a));
        setForm({});
        setEditId(null);
        setModal(null);
        setLastSaved(new Date());
      };

      const deleteAsset = id => {
        if (confirm("Delete this asset?")) {
          setAssets(prev => prev.filter(a => a.id !== id));
          setLastSaved(new Date());
        }
      };

      const exportPDF = () => {
        const content = `WEALTH MANAGEMENT DASHBOARD
Total Net Worth: ${fmt(totalWorth)}
Liquid Assets: ${fmt(liquidAssets)}
Physical Assets: ${fmt(physicalAssets)}

${categoryBreakdown.map(c => `${c.category}: ${fmt(c.amount)} (${c.percentage}%)`).join('\n')}
`;
        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "wealth-report.txt";
        a.click();
      };

      const timeStr = lastSaved.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });

      return e("div", null,
        e("div", { className: "container" },
          // HEADER
          e("div", { className: "header" },
            e("div", { className: "header-left" },
              e("span", { className: "check-icon" }, "✓"),
              e("h1", { className: "header-title" }, "Wealth Management")
            ),
            e("div", { className: "header-right" },
              e("span", { className: "timestamp" }, `Saved at ${timeStr}`),
              e("button", { className: "btn btn-secondary btn-sm", onClick: () => window.print() }, "🖨️ Print"),
              e("button", { className: "btn btn-secondary btn-sm", onClick: exportPDF }, "⬇️ Download"),
              e("button", { className: "btn btn-primary btn-sm", onClick: () => { setForm({}); setEditId(null); setModal("add"); } }, "+ Add Asset")
            )
          ),

          // SUMMARY CARDS
          e("div", { className: "stats-grid" },
            e("div", { className: "stat-card" },
              e("div", { className: "stat-label" }, "Total Net Worth"),
              e("div", { className: "stat-value" }, fmt(totalWorth))
            ),
            e("div", { className: "stat-card" },
              e("div", { className: "stat-label" }, "Liquid / Financial Assets"),
              e("div", { className: "stat-value" }, fmt(liquidAssets))
            ),
            e("div", { className: "stat-card" },
              e("div", { className: "stat-label" }, "Physical / Gold Assets"),
              e("div", { className: "stat-value" }, fmt(physicalAssets))
            )
          ),

          // EXECUTIVE SUMMARY
          e("div", { className: "section" },
            e("h2", { className: "section-title" }, "📊 Executive Summary"),
            e("table", null,
              e("thead", null,
                e("tr", null,
                  e("th", null, "Asset Category"),
                  e("th", { className: "amount" }, "Amount (INR)"),
                  e("th", null, "Portfolio Allocation")
                )
              ),
              e("tbody", null,
                categoryBreakdown.map(c =>
                  e("tr", { key: c.category },
                    e("td", null, c.category),
                    e("td", { className: "amount" }, fmt(c.amount)),
                    e("td", null,
                      e("div", { className: "progress-bar" },
                        e("div", { className: "progress-fill", style: { width: c.percentage + "%" } })
                      ),
                      e("div", { className: "percentage" }, c.percentage + "%")
                    )
                  )
                ),
                e("tr", { style: { background: "rgba(99,102,241,0.1)", fontWeight: "600" } },
                  e("td", null, "Total"),
                  e("td", { className: "amount" }, fmt(totalWorth)),
                  e("td", null, "100%")
                )
              )
            )
          ),

          // PORTFOLIO DETAILS
          e("div", { className: "section" },
            e("h2", { className: "section-title" }, "👤 Portfolio Details"),
            e("table", null,
              e("thead", null,
                e("tr", null,
                  e("th", null, "Asset Category"),
                  e("th", null, "Account / Policy"),
                  e("th", null, "Remarks"),
                  e("th", { className: "amount" }, "Amount (INR)"),
                  e("th", null, "Actions")
                )
              ),
              e("tbody", null,
                assets.length > 0 ? assets.map(a =>
                  e("tr", { key: a.id },
                    e("td", null, a.category),
                    e("td", null, a.account || "-"),
                    e("td", null, a.remarks || "-"),
                    e("td", { className: "amount" }, fmt(a.amount)),
                    e("td", null,
                      e("div", { className: "action-buttons" },
                        e("button", { className: "btn btn-secondary btn-sm", onClick: () => { setForm(a); setEditId(a.id); setModal("edit"); } }, "✏️"),
                        e("button", { className: "btn btn-secondary btn-sm", onClick: () => deleteAsset(a.id) }, "🗑️")
                      )
                    )
                  )
                ) : e("tr", null, e("td", { colSpan: 5, style: { textAlign: "center", color: "#6b7280" } }, "No assets added yet"))
              )
            )
          )
        ),

        // MODALS
        modal === "add" ? e("div", { className: "modal show" },
          e("div", { className: "modal-content", onClick: ev => ev.stopPropagation() },
            e("div", { className: "modal-header" },
              e("h3", null, "Add Asset"),
              e("button", { className: "btn btn-secondary btn-sm", onClick: () => setModal(null) }, "✕")
            ),
            e("div", { className: "modal-body" },
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Asset Category"),
                e("input", { className: "input-field", placeholder: "e.g. Stocks, Gold, Property", value: form.category || "", onChange: ev => setForm({ ...form, category: ev.target.value }) })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Account / Policy"),
                e("input", { className: "input-field", placeholder: "e.g. HDFC Account, SBI FD", value: form.account || "", onChange: ev => setForm({ ...form, account: ev.target.value }) })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Remarks"),
                e("input", { className: "input-field", placeholder: "Any notes", value: form.remarks || "", onChange: ev => setForm({ ...form, remarks: ev.target.value }) })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Amount (INR)"),
                e("input", { className: "input-field", type: "number", placeholder: "0", value: form.amount || "", onChange: ev => setForm({ ...form, amount: +ev.target.value }) })
              ),
              e("div", { style: { display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 24 } },
                e("button", { className: "btn btn-secondary", onClick: () => setModal(null) }, "Cancel"),
                e("button", { className: "btn btn-primary", onClick: addAsset }, "Add Asset")
              )
            )
          )
        ) : null,

        modal === "edit" ? e("div", { className: "modal show" },
          e("div", { className: "modal-content", onClick: ev => ev.stopPropagation() },
            e("div", { className: "modal-header" },
              e("h3", null, "Edit Asset"),
              e("button", { className: "btn btn-secondary btn-sm", onClick: () => setModal(null) }, "✕")
            ),
            e("div", { className: "modal-body" },
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Asset Category"),
                e("input", { className: "input-field", value: form.category || "", onChange: ev => setForm({ ...form, category: ev.target.value }) })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Account / Policy"),
                e("input", { className: "input-field", value: form.account || "", onChange: ev => setForm({ ...form, account: ev.target.value }) })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Remarks"),
                e("input", { className: "input-field", value: form.remarks || "", onChange: ev => setForm({ ...form, remarks: ev.target.value }) })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Amount (INR)"),
                e("input", { className: "input-field", type: "number", value: form.amount || "", onChange: ev => setForm({ ...form, amount: +ev.target.value }) })
              ),
              e("div", { style: { display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 24 } },
                e("button", { className: "btn btn-secondary", onClick: () => setModal(null) }, "Cancel"),
                e("button", { className: "btn btn-primary", onClick: updateAsset }, "Save Changes")
              )
            )
          )
        ) : null
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wealth Management Portal</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
      color: #fff;
    }
    #root { min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 40px; height: 40px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header-title { font-size: 28px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .timestamp { font-size: 12px; color: #9ca3af; }

    .btn { padding: 10px 16px; border: none; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { background: transparent; border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; padding: 6px 10px; border-radius: 8px; }
    .btn-icon:hover { background: rgba(99,102,241,0.15); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: linear-gradient(145deg, rgba(30,27,75,0.5), rgba(15,23,42,0.5));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 14px;
      padding: 20px;
      transition: all 0.3s;
    }
    .stat-card:hover { transform: translateY(-4px); border-color: rgba(99,102,241,0.5); }
    .stat-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; font-weight: 600; }
    .stat-value { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .stat-sub { font-size: 12px; color: #6b7280; }

    .section {
      background: linear-gradient(145deg, rgba(30,27,75,0.4), rgba(15,23,42,0.4));
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 28px;
    }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .section-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }

    table { width: 100%; border-collapse: collapse; }
    thead { background: rgba(0,0,0,0.3); }
    th {
      text-align: left;
      padding: 14px;
      font-size: 12px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(99,102,241,0.2);
      letter-spacing: 0.3px;
    }
    td { padding: 14px; border-bottom: 1px solid rgba(99,102,241,0.1); }
    tbody tr:hover { background: rgba(99,102,241,0.06); }
    .text-right { text-align: right; }

    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin: 6px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 4px;
      transition: width 0.3s;
    }

    .portfolio-card {
      background: linear-gradient(145deg, rgba(40,37,95,0.5), rgba(20,30,48,0.5));
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .portfolio-card:hover { border-color: rgba(99,102,241,0.5); background: linear-gradient(145deg, rgba(50,47,115,0.5), rgba(30,40,68,0.5)); }
    .portfolio-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .portfolio-info { flex: 1; }
    .portfolio-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .portfolio-desc { font-size: 12px; color: #9ca3af; }
    .portfolio-amount { font-size: 20px; font-weight: 700; text-align: right; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 50; }
    .modal.show { display: flex; align-items: center; justify-content: center; }
    .modal-content {
      background: linear-gradient(145deg, #1e1b4b 0%, #0f172a 100%);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 16px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header { padding: 24px; border-bottom: 1px solid rgba(99,102,241,0.2); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 20px; font-weight: 700; }
    .modal-body { padding: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #d1d5db; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
    .input-field { width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #fff; font-size: 14px; font-family: inherit; transition: all 0.2s; }
    .input-field:focus { outline: none; border-color: rgba(99,102,241,0.6); background: rgba(255,255,255,0.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    .badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; background: rgba(99,102,241,0.2); color: #a5b4fc; text-transform: uppercase; }

    .actions { display: flex; gap: 6px; }
    .empty-state { text-align: center; padding: 48px 20px; color: #6b7280; }

    .total-row { background: rgba(99,102,241,0.1); font-weight: 700; }

    .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 28px; }
    .chart-card { background: linear-gradient(145deg, rgba(30,27,75,0.4), rgba(15,23,42,0.4)); border: 1px solid rgba(99,102,241,0.2); border-radius: 16px; padding: 20px; }
    .chart-title { font-size: 14px; font-weight: 600; color: #d1d5db; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-container { position: relative; height: 300px; margin-bottom: 16px; }
    .top-holdings { max-height: 400px; overflow-y: auto; }
    .holding-item { padding: 12px; border-bottom: 1px solid rgba(99,102,241,0.1); display: flex; justify-content: space-between; align-items: center; }
    .holding-item:last-child { border-bottom: none; }
    .holding-name { flex: 1; }
    .holding-type { font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
    .holding-amount { font-weight: 600; color: #a5b4fc; }
    .net-worth-card { background: linear-gradient(145deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2)); border: 2px solid rgba(99,102,241,0.4); border-radius: 16px; padding: 24px; margin-bottom: 28px; text-align: center; }
    .net-worth-label { font-size: 12px; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; }
    .net-worth-amount { font-size: 36px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .net-worth-sub { font-size: 12px; color: #6b7280; margin-top: 8px; }

    .goals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .goal-card { background: linear-gradient(145deg, rgba(30,27,75,0.5), rgba(15,23,42,0.5)); border: 1px solid rgba(99,102,241,0.3); border-radius: 14px; padding: 20px; transition: all 0.3s; }
    .goal-card:hover { border-color: rgba(99,102,241,0.5); transform: translateY(-2px); }
    .goal-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; }
    .goal-name { font-size: 16px; font-weight: 600; color: #fff; }
    .goal-category { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 10px; background: rgba(99,102,241,0.2); color: #a5b4fc; text-transform: uppercase; }
    .goal-progress-section { margin-bottom: 16px; }
    .goal-progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #9ca3af; margin-bottom: 8px; }
    .goal-progress-value { font-weight: 600; color: #a5b4fc; }
    .goal-progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
    .goal-progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 4px; transition: width 0.3s; }
    .goal-progress-fill.on-track { background: linear-gradient(90deg, #10b981, #34d399); }
    .goal-progress-fill.behind { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .goal-progress-fill.exceeded { background: linear-gradient(90deg, #8b5cf6, #d946ef); }
    .goal-stats { display: flex; gap: 16px; font-size: 12px; }
    .goal-stat { flex: 1; }
    .goal-stat-label { color: #9ca3af; margin-bottom: 2px; }
    .goal-stat-value { font-size: 14px; font-weight: 600; color: #fff; }
    .goal-status { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 8px; border-radius: 6px; margin-top: 12px; }
    .goal-status.on-track { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .goal-status.behind { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .goal-status.exceeded { background: rgba(139,92,246,0.15); color: #d8b4fe; }
    .goal-actions { display: flex; gap: 6px; margin-top: 12px; }

    @media print {
      body { background: white; color: black; }
      .header-right { display: none; }
      .modal { display: none !important; }
    }

    @media (max-width: 1024px) {
      .form-row-3 { grid-template-columns: 1fr 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 768px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
      .portfolio-header { flex-direction: column; align-items: flex-start; }
      .portfolio-amount { text-align: left; }
      th, td { padding: 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useMemo } = React;
    const e = React.createElement;

    const fmt = n => "₹" + Number(n).toLocaleString("en-IN");

    const autoDetectBank = (portfolioName) => {
      if (!portfolioName) return false;
      const name = portfolioName.toLowerCase();

      // Non-bank keywords
      const nonBankKeywords = ["epf", "ppf", "gratuity", "sukanya", "ulip", "gold", "house", "apartment", "car", "two wheeler", "property", "asset", "retirement", "personal", "physical"];
      if (nonBankKeywords.some(keyword => name.includes(keyword))) return false;

      // Bank keywords
      const bankKeywords = ["bank", "insurance", "credit", "union", "brokerage", "hdfc", "icici", "axis", "sbi", "federal", "kotak", "yes bank"];
      if (bankKeywords.some(keyword => name.includes(keyword))) return true;

      // Default: if it has a clear institution name, treat as bank
      return true;
    };

    // Investment calculation helpers for Phase 2
    const calculateInvestmentAge = (purchaseDate) => {
      if (!purchaseDate) return { value: 0, unit: "days" };
      const purchase = new Date(purchaseDate);
      const today = new Date();
      const diffMs = today - purchase;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const diffMonths = Math.floor(diffDays / 30);
      const diffYears = Math.floor(diffDays / 365);

      if (diffYears > 0) return { value: diffYears, unit: diffYears === 1 ? "year" : "years" };
      if (diffMonths > 0) return { value: diffMonths, unit: diffMonths === 1 ? "month" : "months" };
      return { value: diffDays, unit: diffDays === 1 ? "day" : "days" };
    };

    const calculateReturns = (currentAmount, costBasis) => {
      if (!costBasis || costBasis === 0) return { gain: 0, roi: 0 };
      const gain = currentAmount - costBasis;
      const roi = (gain / costBasis) * 100;
      return { gain, roi };
    };

    // Investment type grouping for summary
    const groupInvestmentType = (type) => {
      const typeMap = {
        "Car": "Vehicles",
        "Two Wheeler": "Vehicles",
        "Physical Gold": "Gold",
        "ETF": "Gold"
      };
      return typeMap[type] || type;
    };

    const loadData = (key, fallback) => {
      try {
        const d = localStorage.getItem(key);
        if (!d) return fallback;
        const parsed = JSON.parse(d);

        // Auto-migrate old data without isBank field
        if (Array.isArray(parsed)) {
          return parsed.map(p => ({
            ...p,
            isBank: p.isBank !== undefined ? p.isBank : autoDetectBank(p.bankName)
          }));
        }
        return parsed;
      } catch {
        return fallback;
      }
    };

    const investmentTypes = ["Savings Account", "Fixed Deposit", "ULIP", "Mutual Fund", "Stocks", "Employee Provident Fund", "Public Provident Fund", "Sukanya Samridhi", "Gratuity", "Physical Gold", "ETF", "House/Apartment", "Car", "Two Wheeler", "Other"];

    const defaultPortfolios = [
      {
        id: 1,
        isBank: true,
        bankName: "SBI Bank",
        userName: "Sylish Kumar",
        investments: [
          { id: 1, type: "Savings Account", name: "Primary Savings", amount: 85000, costBasis: 85000, purchaseDate: "2023-01-15" },
          { id: 2, type: "Fixed Deposit", name: "3-Year FD", amount: 600000, costBasis: 550000, purchaseDate: "2022-06-20" }
        ]
      },
      {
        id: 2,
        isBank: true,
        bankName: "HDFC Bank",
        userName: "Sylish Kumar",
        investments: [
          { id: 1, type: "Mutual Fund", name: "HDFC Equity Fund", amount: 200000, costBasis: 150000, purchaseDate: "2021-03-10" },
          { id: 2, type: "Stocks", name: "Blue Chip Stocks", amount: 2550000, costBasis: 2000000, purchaseDate: "2020-11-05" }
        ]
      },
      {
        id: 3,
        isBank: true,
        bankName: "ICICI Insurance",
        userName: "Sylish Kumar",
        investments: [
          { id: 1, type: "ULIP", name: "ICICI ULIPs", amount: 340000, costBasis: 300000, purchaseDate: "2021-07-22" }
        ]
      },
      {
        id: 4,
        isBank: false,
        bankName: "Employee Provident Fund",
        userName: "Sylish Kumar",
        investments: [
          { id: 1, type: "Employee Provident Fund", name: "EPF Account", amount: 450000, costBasis: 420000, purchaseDate: "2019-04-01" }
        ]
      },
      {
        id: 5,
        isBank: false,
        bankName: "Physical Assets",
        userName: "Personal",
        investments: [
          { id: 1, type: "Physical Gold", name: "Gold Ornaments", amount: 150000, costBasis: 120000, purchaseDate: "2022-02-14" },
          { id: 2, type: "House/Apartment", name: "Residential Property", amount: 3500000, costBasis: 2800000, purchaseDate: "2018-09-30" }
        ]
      }
    ];

    function App() {
      const [portfolios, setPortfolios] = useState(() => loadData("wealth_portfolios", defaultPortfolios));
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({});
      const [investForm, setInvestForm] = useState({});
      const [editId, setEditId] = useState(null);
      const [editInvId, setEditInvId] = useState(null);
      const [activePortfolioId, setActivePortfolioId] = useState(null);
      const [expandedPortfolio, setExpandedPortfolio] = useState(null);
      const [lastSaved, setLastSaved] = useState(new Date());
      const [portfolioSort, setPortfolioSort] = useState("bankName");
      const [summarySort, setSummarySort] = useState("amount");
      const [goals, setGoals] = useState(() => loadData("wealth_goals", [
        { id: 1, name: "🎯 Retirement Corpus", category: "Retirement", targetAmount: 10000000, currentAmount: 2065000, targetDate: "2030-12-31" },
        { id: 2, name: "📚 Adhvika's Education (Sukanya Samriddhi)", category: "Education", targetAmount: 2700000, currentAmount: 1080000, targetDate: "2031-12-31" },
        { id: 3, name: "🛡️ Insurance Coverage Fund", category: "Emergency", targetAmount: 1500000, currentAmount: 500000, targetDate: "2026-12-31" },
        { id: 4, name: "💰 Emergency Fund (6-12 months)", category: "Emergency", targetAmount: 1200000, currentAmount: 400000, targetDate: "2025-12-31" },
        { id: 5, name: "📈 Annual PPF Contributions (Sylish & Adhvika)", category: "Savings", targetAmount: 360000, currentAmount: 180000, targetDate: "2025-12-31" },
        { id: 6, name: "📊 Annual Mutual Fund SIP", category: "Investment", targetAmount: 1440000, currentAmount: 720000, targetDate: "2025-12-31" }
      ]));
      const [goalForm, setGoalForm] = useState({});
      const [editGoalId, setEditGoalId] = useState(null);

      useEffect(() => { localStorage.setItem("wealth_portfolios", JSON.stringify(portfolios)); }, [portfolios]);
      useEffect(() => { localStorage.setItem("wealth_goals", JSON.stringify(goals)); }, [goals]);

      const stats = useMemo(() => {
        const allInvestments = portfolios.flatMap(p => p.investments);
        const total = allInvestments.reduce((s, i) => s + i.amount, 0);
        const byType = {};
        allInvestments.forEach(i => {
          const groupedType = groupInvestmentType(i.type);
          if (!byType[groupedType]) byType[groupedType] = { amount: 0, count: 0 };
          byType[groupedType].amount += i.amount;
          byType[groupedType].count += 1;
        });
        return { total, byType, allInvestments };
      }, [portfolios]);

      // Analytics calculations for Phase 1
      const analytics = useMemo(() => {
        const allInv = stats.allInvestments;
        const total = stats.total;

        // Portfolio distribution (by bank)
        const byBank = {};
        portfolios.forEach(p => {
          const portTotal = p.investments.reduce((s, i) => s + i.amount, 0);
          if (!byBank[p.bankName]) byBank[p.bankName] = 0;
          byBank[p.bankName] += portTotal;
        });

        // Top holdings
        const topHoldings = allInv.sort((a, b) => b.amount - a.amount).slice(0, 5);

        return {
          netWorth: total,
          holdingsCount: allInv.length,
          portfolioCount: portfolios.length,
          bankCount: portfolios.filter(p => p.isBank).length,
          nonBankCount: portfolios.filter(p => !p.isBank).length,
          byBank: byBank,
          topHoldings: topHoldings
        };
      }, [portfolios, stats]);

      // Chart rendering effect
      useEffect(() => {
        if (!stats.total || stats.total === 0) return;

        const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#06b6d4', '#3b82f6', '#f43f5e'];

        // Asset Allocation Chart
        const ctx1 = document.getElementById('assetAllocationChart');
        if (ctx1) {
          const typeLabels = Object.keys(stats.byType);
          const typeData = typeLabels.map(t => stats.byType[t].amount);

          if (window.assetChart) window.assetChart.destroy();
          window.assetChart = new Chart(ctx1, {
            type: 'doughnut',
            data: {
              labels: typeLabels,
              datasets: [{
                data: typeData,
                backgroundColor: colors.slice(0, typeLabels.length),
                borderColor: 'rgba(15,23,42,0.8)',
                borderWidth: 2
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: 'bottom',
                  labels: { color: '#d1d5db', padding: 15, font: { size: 11 } }
                }
              }
            }
          });
        }

        // Portfolio Distribution Chart
        const ctx2 = document.getElementById('portfolioDistributionChart');
        if (ctx2) {
          const bankLabels = Object.keys(analytics.byBank);
          const bankData = bankLabels.map(b => analytics.byBank[b]);

          if (window.portfolioChart) window.portfolioChart.destroy();
          window.portfolioChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
              labels: bankLabels,
              datasets: [{
                data: bankData,
                backgroundColor: colors.slice(0, bankLabels.length),
                borderColor: 'rgba(15,23,42,0.8)',
                borderWidth: 2
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: 'bottom',
                  labels: { color: '#d1d5db', padding: 15, font: { size: 11 } }
                }
              }
            }
          });
        }
      }, [stats, analytics]);

      // Goal progress calculations for Phase 3
      const goalProgress = useMemo(() => {
        return goals.map(goal => {
          const progress = (goal.currentAmount / goal.targetAmount) * 100;
          const remaining = goal.targetAmount - goal.currentAmount;
          const targetDate = new Date(goal.targetDate);
          const today = new Date();
          const daysLeft = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));
          const monthsLeft = Math.ceil(daysLeft / 30);
          const yearsLeft = Math.ceil(daysLeft / 365);

          let status = "on-track";
          if (progress >= 100) status = "exceeded";
          else if (daysLeft < 0) status = "behind";

          return {
            ...goal,
            progress: Math.min(progress, 100),
            progressPct: progress.toFixed(1),
            remaining,
            daysLeft,
            monthsLeft,
            yearsLeft,
            status
          };
        });
      }, [goals]);

      const addPortfolio = () => {
        if (!form.userName) return;
        if (form.isBank && !form.bankName) return;

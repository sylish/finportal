<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinPortal - Advanced Portfolio Management</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%); color: #fff; }
    #root { min-height: 100vh; }
    .progress-bar { transition: width 0.3s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Clear corrupted localStorage on load
    try {
      const test = localStorage.getItem("finportal_portfolios");
      if (test) {
        JSON.parse(test);
      }
    } catch (e) {
      console.warn("Clearing corrupted localStorage...");
      localStorage.removeItem("finportal_portfolios");
      localStorage.removeItem("finportal_goals");
      localStorage.removeItem("finportal_alerts");
      localStorage.removeItem("finportal_categories");
    }
  </script>

  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;

    const COLORS = ["#6366f1", "#22d3ee", "#f59e0b", "#ef4444", "#10b981", "#ec4899", "#8b5cf6", "#14b8a6", "#fbbf24", "#a78bfa"];
    const CATEGORY_ICONS = { Stocks: "📈", "Mutual Funds": "📊", "Fixed Deposits": "🏦", "Government Funds": "📋", "Real Estate": "🏠", Crypto: "₿", Cash: "💵", Gold: "🪙", "Provident Fund": "🏛️", Vehicles: "🚗" };
    const defaultCategories = ["Stocks", "Mutual Funds", "Fixed Deposits", "Government Funds", "Real Estate", "Crypto", "Cash", "Gold", "Provident Fund", "Vehicles"];

    const initialPortfolios = [
      {
        id: 1, name: "Retirement Fund", description: "Long-term retirement savings",
        investments: [
          { id: 1, name: "S&P 500 Index Fund", category: "Mutual Funds", invested: 45000, current: 52300, units: 120, date: "2023-01-15" },
          { id: 2, name: "Apple Inc.", category: "Stocks", invested: 15000, current: 19200, units: 85, date: "2022-06-20" },
          { id: 3, name: "US Treasury Bonds", category: "Bonds", invested: 30000, current: 31500, units: 30, date: "2021-11-01" },
          { id: 4, name: "Vanguard Total Bond", category: "Bonds", invested: 20000, current: 20800, units: 200, date: "2023-03-10" },
          { id: 5, name: "Real Estate Trust", category: "Real Estate", invested: 25000, current: 28900, units: 50, date: "2022-01-05" },
          { id: 6, name: "High-Yield Savings", category: "Cash", invested: 10000, current: 10450, units: 1, date: "2024-01-01" },
        ],
      },
      {
        id: 2, name: "Growth Portfolio", description: "Aggressive growth strategy",
        investments: [
          { id: 1, name: "Tesla Inc.", category: "Stocks", invested: 20000, current: 26500, units: 50, date: "2023-05-10" },
          { id: 2, name: "NVIDIA Corp.", category: "Stocks", invested: 18000, current: 31200, units: 30, date: "2023-02-14" },
          { id: 3, name: "Bitcoin", category: "Crypto", invested: 15000, current: 22100, units: 0.35, date: "2023-07-20" },
          { id: 4, name: "Ethereum", category: "Crypto", invested: 8000, current: 11300, units: 4.5, date: "2023-08-01" },
          { id: 5, name: "ARK Innovation ETF", category: "Mutual Funds", invested: 12000, current: 10800, units: 250, date: "2023-04-15" },
          { id: 6, name: "Amazon.com Inc.", category: "Stocks", invested: 16000, current: 21400, units: 90, date: "2022-11-20" },
        ],
      },
      {
        id: 3, name: "Conservative Fund", description: "Low-risk stable returns",
        investments: [
          { id: 1, name: "Municipal Bonds", category: "Bonds", invested: 40000, current: 42200, units: 40, date: "2022-03-01" },
          { id: 2, name: "Money Market Fund", category: "Cash", invested: 25000, current: 26100, units: 1, date: "2023-01-01" },
          { id: 3, name: "Rental Property REIT", category: "Real Estate", invested: 35000, current: 38500, units: 70, date: "2021-09-15" },
          { id: 4, name: "Corporate Bond Fund", category: "Bonds", invested: 20000, current: 21300, units: 200, date: "2023-06-01" },
          { id: 5, name: "Johnson & Johnson", category: "Stocks", invested: 10000, current: 11200, units: 60, date: "2023-02-28" },
          { id: 6, name: "Procter & Gamble", category: "Stocks", invested: 8000, current: 9100, units: 50, date: "2023-05-15" },
        ],
      },
    ];

    const formatCurrency = (n) => {
      if (n >= 10000000) return "₹" + (n / 10000000).toFixed(2) + " Cr";
      if (n >= 100000) return "₹" + (n / 100000).toFixed(2) + " L";
      return "₹" + n.toLocaleString("en-IN", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    };
    const formatPct = (n) => (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
    const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString("en-IN", { month: "short", day: "numeric", year: "2-digit" });

    const calculatePerformanceMetrics = (investments) => {
      if (!investments.length) return { roi: 0, volatility: 0, sharpeRatio: 0 };
      const totalInvested = investments.reduce((s, i) => s + i.invested, 0);
      const totalCurrent = investments.reduce((s, i) => s + i.current, 0);
      const roi = totalInvested ? ((totalCurrent - totalInvested) / totalInvested) * 100 : 0;
      const returns = investments.map(i => ((i.current - i.invested) / i.invested) * 100);
      const meanReturn = returns.reduce((a, b) => a + b, 0) / returns.length;
      const variance = returns.reduce((s, r) => s + Math.pow(r - meanReturn, 2), 0) / returns.length;
      const volatility = Math.sqrt(variance);
      const sharpeRatio = volatility ? (roi - 2.5) / volatility : 0;
      return { roi, volatility, sharpeRatio };
    };

    const calculateRiskScore = (portfolio) => {
      const investments = portfolio.investments;
      if (!investments.length) return 0;
      const categoryRisks = { Stocks: 8, Crypto: 9, "Mutual Funds": 5, "Fixed Deposits": 1, "Government Funds": 2, "Real Estate": 6, Cash: 1, Gold: 3, "Provident Fund": 2, Vehicles: 4 };
      const diversification = investments.length > 5 ? 10 : investments.length * 2;
      const totalCurrent = investments.reduce((s, i) => s + i.current, 0);
      const weightedRisk = investments.reduce((s, i) => s + (categoryRisks[i.category] || 5) * (i.current / totalCurrent), 0);
      const riskScore = (weightedRisk + diversification) / 2;
      return Math.min(100, Math.max(0, riskScore));
    };

    function Modal({ open, onClose, title, children }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center" onClick={onClose}>
          <div className="absolute inset-0 bg-black bg-opacity-70 backdrop-blur-sm" />
          <div className="relative w-full max-w-lg mx-4 rounded-2xl overflow-hidden max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}
            style={{ background: "linear-gradient(145deg, #1e1b4b 0%, #0f172a 100%)", border: "1px solid rgba(99,102,241,0.3)", boxShadow: "0 25px 60px rgba(0,0,0,0.5)" }}>
            <div className="flex items-center justify-between p-5 sticky top-0" style={{ borderBottom: "1px solid rgba(255,255,255,0.08)", background: "linear-gradient(145deg, #1e1b4b 0%, #0f172a 100%)" }}>
              <h3 className="text-lg font-semibold text-white">{title}</h3>
              <button onClick={onClose} className="p-1 rounded-lg text-gray-400 hover:text-white hover:bg-white hover:bg-opacity-10 transition-colors">✕</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    function Field({ label, value, onChange, type = "text", placeholder }) {
      return (
        <div className="mb-4">
          <label className="block text-sm font-medium text-gray-300 mb-1.5">{label}</label>
          <input type={type} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
            className="w-full px-3 py-2.5 rounded-xl text-white text-sm outline-none transition-all"
            style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)" }}
            onFocus={(e) => (e.target.style.borderColor = "rgba(99,102,241,0.6)")}
            onBlur={(e) => (e.target.style.borderColor = "rgba(255,255,255,0.1)")} />
        </div>
      );
    }

    function Select({ label, value, onChange, options }) {
      return (
        <div className="mb-4">
          <label className="block text-sm font-medium text-gray-300 mb-1.5">{label}</label>
          <select value={value} onChange={(e) => onChange(e.target.value)}
            className="w-full px-3 py-2.5 rounded-xl text-white text-sm outline-none transition-all"
            style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)" }}>
            {options.map((o) => <option key={o} value={o} style={{ background: "#1e1b4b" }}>{o}</option>)}
          </select>
        </div>
      );
    }

    function StatCard({ icon, label, value, sub, color = "#6366f1" }) {
      return (
        <div className="rounded-2xl p-5 flex flex-col gap-2 transition-transform hover:scale-105"
          style={{ background: "linear-gradient(145deg, rgba(30,27,75,0.8) 0%, rgba(15,23,42,0.8) 100%)", border: "1px solid rgba(255,255,255,0.06)", boxShadow: "0 4px 20px rgba(0,0,0,0.2)" }}>
          <div className="flex items-center gap-2">
            <div className="p-2 rounded-xl text-2xl" style={{ background: `${color}22` }}>{icon}</div>
            <span className="text-sm font-medium text-gray-400 uppercase tracking-wider">{label}</span>
          </div>
          <div className="text-3xl font-bold text-white">{value}</div>
          {sub && <div className="text-base" style={{ color }}>{sub}</div>}
        </div>
      );
    }

    /* Main Dashboard */
    function FinancialDashboard() {
      const [portfolios, setPortfolios] = useState(() => {
        try {
          const saved = localStorage.getItem("finportal_portfolios");
          if (!saved) return initialPortfolios;
          const parsed = JSON.parse(saved);
          if (!Array.isArray(parsed)) return initialPortfolios;
          return parsed.map(p => ({
            id: p.id || Date.now(),
            name: p.name || "Portfolio",
            description: p.description || "",
            investments: Array.isArray(p.investments) ? p.investments.map(i => {
              let category = i.category || "Stocks";
              // Auto-convert old category names
              if (category === "Bonds") {
                category = "Fixed Deposits";
              } else if (category === "Fixed Deposits and Government Funds") {
                // Check if it's actually a Provident Fund
                const nameUpper = (i.name || "").toUpperCase();
                if (nameUpper.includes("PROVIDENT") || nameUpper.includes("PPF") || nameUpper.includes("SUKANYA") || nameUpper.includes("EPF") || nameUpper.includes("GRATUITY")) {
                  category = "Provident Fund";
                } else {
                  category = "Fixed Deposits";
                }
              }
              return {
                id: i.id || Date.now(),
                name: i.name || "Investment",
                category: category,
                invested: parseFloat(i.invested) || 0,
                current: parseFloat(i.current) || 0,
                units: parseFloat(i.units) || 1,
                date: i.date || "2024-01-01"
              };
            }) : []
          }));
        } catch (e) {
          console.error("Error loading portfolios:", e);
          localStorage.removeItem("finportal_portfolios");
          return initialPortfolios;
        }
      });

      const [categories, setCategories] = useState(() => {
        try {
          const saved = localStorage.getItem("finportal_categories");
          return saved && Array.isArray(JSON.parse(saved)) ? JSON.parse(saved) : defaultCategories;
        } catch {
          return defaultCategories;
        }
      });

      const [goals, setGoals] = useState(() => {
        try {
          const saved = localStorage.getItem("finportal_goals");
          return saved && Array.isArray(JSON.parse(saved)) ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });

      const [alerts, setAlerts] = useState(() => {
        try {
          const saved = localStorage.getItem("finportal_alerts");
          return saved && Array.isArray(JSON.parse(saved)) ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });

      const [view, setView] = useState("summary");
      const [showGoals, setShowGoals] = useState(false);
      const [showAlerts, setShowAlerts] = useState(false);
      const [showReports, setShowReports] = useState(false);
      const [searchTerm, setSearchTerm] = useState("");
      const [sortBy, setSortBy] = useState("name");
      const [portfolioView, setPortfolioView] = useState("user");
      const [editingPortfolioId, setEditingPortfolioId] = useState(null);
      const [editingInvestmentId, setEditingInvestmentId] = useState(null);
      const [editPortfolioData, setEditPortfolioData] = useState({ name: "", description: "" });
      const [editInvestmentData, setEditInvestmentData] = useState({ name: "", category: "Stocks", invested: 0, current: 0, units: 0 });
      const [newGoal, setNewGoal] = useState({ name: "", targetValue: "", portfolio: portfolios[0]?.id || 1 });
      const [newAlert, setNewAlert] = useState({ name: "", condition: "loss", threshold: 10, portfolio: portfolios[0]?.id || 1 });
      const [newPortfolio, setNewPortfolio] = useState({ name: "", description: "" });
      const [newInvestment, setNewInvestment] = useState({ name: "", category: "Stocks", invested: 0, current: 0, units: 0 });

      // Save to localStorage
      useMemo(() => { localStorage.setItem("finportal_portfolios", JSON.stringify(portfolios)); }, [portfolios]);
      useMemo(() => { localStorage.setItem("finportal_goals", JSON.stringify(goals)); }, [goals]);
      useMemo(() => { localStorage.setItem("finportal_alerts", JSON.stringify(alerts)); }, [alerts]);

      // Data aggregation functions
      const allInvestments = useMemo(() => {
        return portfolios.flatMap(p => p.investments.map(i => ({ ...i, portfolioId: p.id, portfolioName: p.name })));
      }, [portfolios]);

      const summaryStats = useMemo(() => {
        let invested = 0, current = 0;
        portfolios.forEach((p) => p.investments.forEach((i) => { invested += i.invested; current += i.current; }));
        return { invested, current, gain: current - invested, gainPct: invested ? ((current - invested) / invested) * 100 : 0 };
      }, [portfolios]);

      const categoryBreakdown = useMemo(() => {
        const breakdown = {};
        defaultCategories.forEach(cat => { breakdown[cat] = { invested: 0, current: 0, count: 0 }; });
        allInvestments.forEach(inv => {
          if (breakdown[inv.category]) {
            breakdown[inv.category].invested += inv.invested;
            breakdown[inv.category].current += inv.current;
            breakdown[inv.category].count += 1;
          }
        });
        return breakdown;
      }, [allInvestments]);

      const userBreakdown = useMemo(() => {
        const breakdown = {};
        portfolios.forEach(p => {
          const rawName = (p.description?.split("Account holder: ")[1] || "Other").split('\n')[0].trim();
          const userKey = rawName.toLowerCase();
          if (!breakdown[userKey]) breakdown[userKey] = { displayName: rawName, portfolios: [], invested: 0, current: 0 };
          breakdown[userKey].portfolios.push(p);
          p.investments.forEach(i => { breakdown[userKey].invested += i.invested; breakdown[userKey].current += i.current; });
        });
        return breakdown;
      }, [portfolios]);

      const topHoldings = useMemo(() => {
        return allInvestments.sort((a, b) => b.current - a.current).slice(0, 10);
      }, [allInvestments]);

      // Portfolio management
      const addPortfolio = () => {
        if (!newPortfolio.name) return;
        const portfolio = { id: Date.now(), name: newPortfolio.name, description: newPortfolio.description, investments: [] };
        setPortfolios([...portfolios, portfolio]);
        setNewPortfolio({ name: "", description: "" });
      };

      const deletePortfolio = (id) => {
        setPortfolios(portfolios.filter(p => p.id !== id));
      };

      const addInvestment = (portfolioId) => {
        if (!newInvestment.name) return;
        setPortfolios(portfolios.map(p => {
          if (p.id === portfolioId) {
            return { ...p, investments: [...p.investments, { ...newInvestment, id: Date.now(), date: new Date().toISOString().split('T')[0] }] };
          }
          return p;
        }));
        setNewInvestment({ name: "", category: "Stocks", invested: 0, current: 0, units: 0 });
      };

      const deleteInvestment = (portfolioId, investmentId) => {
        setPortfolios(portfolios.map(p => {
          if (p.id === portfolioId) {
            return { ...p, investments: p.investments.filter(i => i.id !== investmentId) };
          }
          return p;
        }));
      };

      const updateInvestment = (portfolioId, investmentId, updates) => {
        setPortfolios(portfolios.map(p => {
          if (p.id === portfolioId) {
            return { ...p, investments: p.investments.map(i => i.id === investmentId ? { ...i, ...updates } : i) };
          }
          return p;
        }));
      };

      const startEditPortfolio = (portfolio) => {
        setEditingPortfolioId(portfolio.id);
        setEditPortfolioData({ name: portfolio.name, description: portfolio.description });
      };

      const saveEditPortfolio = (portfolioId) => {
        setPortfolios(portfolios.map(p => {
          if (p.id === portfolioId) {
            return { ...p, ...editPortfolioData };
          }
          return p;
        }));
        setEditingPortfolioId(null);
      };

      const cancelEditPortfolio = () => {
        setEditingPortfolioId(null);
        setEditPortfolioData({ name: "", description: "" });
      };

      const startEditInvestment = (portfolioId, investment) => {
        setEditingInvestmentId(investment.id);
        setEditInvestmentData({ name: investment.name, category: investment.category, invested: investment.invested, current: investment.current, units: investment.units });
      };

      const saveEditInvestment = (portfolioId, investmentId) => {
        updateInvestment(portfolioId, investmentId, editInvestmentData);
        setEditingInvestmentId(null);
      };

      const cancelEditInvestment = () => {
        setEditingInvestmentId(null);
        setEditInvestmentData({ name: "", category: "Stocks", invested: 0, current: 0, units: 0 });
      };

      // Goals & Alerts
      const addGoal = () => {
        if (!newGoal.name || !newGoal.targetValue) return;
        setGoals([...goals, { id: Date.now(), ...newGoal, targetValue: parseFloat(newGoal.targetValue) }]);
        setNewGoal({ name: "", targetValue: "", portfolio: portfolios[0]?.id || 1 });
      };

      const deleteGoal = (id) => setGoals(goals.filter(g => g.id !== id));

      const addAlert = () => {
        if (!newAlert.name) return;
        setAlerts([...alerts, { id: Date.now(), ...newAlert, threshold: parseFloat(newAlert.threshold) }]);
        setNewAlert({ name: "", condition: "loss", threshold: 10, portfolio: portfolios[0]?.id || 1 });
      };

      const deleteAlert = (id) => setAlerts(alerts.filter(a => a.id !== id));

      // Export/Import
      const exportData = () => {
        const data = { portfolios, goals, alerts, categories };
        const dataStr = JSON.stringify(data, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `finportal-export-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
      };

      const migrateOldFormat = (oldData) => {
        if (!oldData.portfolios || !Array.isArray(oldData.portfolios)) return oldData;
        const isOldFormat = oldData.portfolios.some(p => p.bankName || p.userName);
        if (!isOldFormat) return oldData;

        const typeToCategory = {
          "Savings Account": "Cash", "Fixed Deposit": "Fixed Deposits", "Public Provident Fund": "Provident Fund",
          "Mutual Fund": "Mutual Funds", "Stocks": "Stocks", "ETF": "Stocks", "ULIP": "Mutual Funds",
          "Employee Provident Fund": "Provident Fund", "Gratuity": "Cash", "Physical Gold": "Gold",
          "House/Apartment": "Real Estate", "Car": "Vehicles", "Two Wheeler": "Vehicles", "Sukanya Samridhi": "Provident Fund"
        };

        const migratedPortfolios = oldData.portfolios.map(oldPort => {
          const portfolioName = oldPort.bankName || "Portfolio";
          const description = oldPort.userName ? `Account holder: ${oldPort.userName}` : "";
          const migratedInvestments = oldPort.investments.map(oldInv => ({
            id: oldInv.id,
            name: oldInv.name,
            category: typeToCategory[oldInv.type] || "Cash",
            invested: oldInv.costBasis || oldInv.amount || 0,
            current: oldInv.amount || 0,
            units: 1,
            date: oldInv.purchaseDate || new Date().toISOString().split('T')[0]
          }));

          return {
            id: oldPort.id,
            name: portfolioName,
            description: description,
            investments: migratedInvestments
          };
        });

        return { portfolios: migratedPortfolios, goals: oldData.goals || [], alerts: oldData.alerts || [], categories: defaultCategories };
      };

      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            let data = JSON.parse(event.target.result);
            data = migrateOldFormat(data);

            if (data.portfolios && Array.isArray(data.portfolios)) {
              const fixedPortfolios = data.portfolios.map(p => ({
                id: p.id || Date.now() + Math.random(),
                name: p.name || "Portfolio",
                description: p.description || "",
                investments: Array.isArray(p.investments) ? p.investments.map(inv => ({
                  id: inv.id || Date.now() + Math.random(),
                  name: inv.name || "Investment",
                  category: inv.category || "Cash",
                  invested: parseFloat(inv.invested) || 0,
                  current: parseFloat(inv.current) || 0,
                  units: parseFloat(inv.units) || 1,
                  date: inv.date || new Date().toISOString().split('T')[0]
                })) : []
              }));
              setPortfolios(fixedPortfolios);
            }

            if (data.goals && Array.isArray(data.goals)) setGoals(data.goals);
            if (data.alerts && Array.isArray(data.alerts)) setAlerts(data.alerts);
            if (data.categories && Array.isArray(data.categories)) setCategories(data.categories);

            alert("✅ Data imported successfully!\n\n📊 Your wealth data has been migrated to the new format.");
            setView("summary");
            setSearchTerm("");
          } catch (error) {
            console.error("Import error:", error);
            alert("❌ Failed to import. File might be corrupted.\n\nError: " + error.message);
          }
        };
        reader.readAsText(file);
      };

      const generateReport = () => {
        const reportText = `FinPortal Report - ${new Date().toLocaleDateString()}\n\nTotal Invested: ${formatCurrency(summaryStats.invested)}\nCurrent Value: ${formatCurrency(summaryStats.current)}\nTotal Gain/Loss: ${formatCurrency(summaryStats.gain)} (${formatPct(summaryStats.gainPct)})\n\nPortfolios: ${portfolios.length}\nInvestments: ${allInvestments.length}`;
        const blob = new Blob([reportText], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `finportal-report-${new Date().toISOString().split('T')[0]}.txt`;
        a.click();
      };

      return (
        <div className="min-h-screen p-6 md:p-8">
          <div className="max-w-7xl mx-auto">
            {/* Header */}
            <div className="mb-8">
              <h1 className="text-4xl font-bold mb-2">💼 FinPortal</h1>

                        <tr className="border-b border-slate-600">
                          <th className="text-left py-2 px-3">Portfolio</th>
                          <th className="text-right py-2 px-3">ROI (%)</th>
                          <th className="text-right py-2 px-3">Volatility (%)</th>
                          <th className="text-right py-2 px-3">Sharpe Ratio</th>
                          <th className="text-right py-2 px-3">Risk Score</th>
                        </tr>
                      </thead>
                      <tbody>
                        {portfolios.map((p) => {
                          const metrics = calculatePerformanceMetrics(p.investments);
                          const risk = calculateRiskScore(p);
                          return (
                            <tr key={p.id} className="border-b border-slate-700 hover:bg-slate-700/30">
                              <td className="py-3 px-3 font-medium">{p.name}</td>
                              <td className="text-right py-3 px-3" style={{color: metrics.roi >= 0 ? "#10b981" : "#ef4444"}}>{formatPct(metrics.roi)}</td>
                              <td className="text-right py-3 px-3">{metrics.volatility.toFixed(2)}%</td>
                              <td className="text-right py-3 px-3">{metrics.sharpeRatio.toFixed(3)}</td>
                              <td className="text-right py-3 px-3">
                                <div className="flex items-center gap-2 justify-end">
                                  <div className="w-16 h-2 rounded bg-slate-700">
                                    <div className="h-full rounded" style={{width: `${Math.min(risk, 100)}%`, background: risk > 70 ? "#ef4444" : risk > 40 ? "#f59e0b" : "#10b981"}}></div>
                                  </div>
                                  <span>{risk.toFixed(0)}</span>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* Goals Modal */}
            <Modal open={showGoals} onClose={() => setShowGoals(false)} title="🎯 Portfolio Goals">
              <div className="space-y-4">
                <div>
                  <h3 className="font-semibold mb-3">Add Goal</h3>
                  <Field label="Goal Name" value={newGoal.name} onChange={(val) => setNewGoal({...newGoal, name: val})} placeholder="e.g., $1M Net Worth" />
                  <Field label="Target Value" type="number" value={newGoal.targetValue} onChange={(val) => setNewGoal({...newGoal, targetValue: val})} placeholder="e.g., 1000000" />
                  <button onClick={addGoal} className="w-full py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-medium">Create Goal</button>
                </div>
                {goals.length > 0 && (
                  <div>
                    <h3 className="font-semibold mb-3">Your Goals</h3>
                    {goals.map(g => (
                      <div key={g.id} className="flex justify-between items-center p-3 bg-slate-700/30 rounded-lg mb-2">
                        <div>
                          <p className="font-medium">{g.name}</p>
                          <p className="text-sm text-gray-400">Target: {formatCurrency(g.targetValue)}</p>
                        </div>
                        <button onClick={() => deleteGoal(g.id)} className="text-red-400 hover:text-red-300">🗑️</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </Modal>

            {/* Alerts Modal */}
            <Modal open={showAlerts} onClose={() => setShowAlerts(false)} title="⚠️ Investment Alerts">
              <div className="space-y-4">
                <div>
                  <h3 className="font-semibold mb-3">Set Alert</h3>
                  <Field label="Alert Name" value={newAlert.name} onChange={(val) => setNewAlert({...newAlert, name: val})} placeholder="e.g., High Risk Alert" />
                  <Select label="Condition" value={newAlert.condition} onChange={(val) => setNewAlert({...newAlert, condition: val})} options={["loss", "gain", "volatility"]} />
                  <Field label="Threshold (%)" type="number" value={newAlert.threshold} onChange={(val) => setNewAlert({...newAlert, threshold: val})} placeholder="e.g., 10" />
                  <button onClick={addAlert} className="w-full py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-medium">Create Alert</button>
                </div>
                {alerts.length > 0 && (
                  <div>
                    <h3 className="font-semibold mb-3">Active Alerts</h3>
                    {alerts.map(a => (
                      <div key={a.id} className="flex justify-between items-center p-3 bg-slate-700/30 rounded-lg mb-2">
                        <div>
                          <p className="font-medium">{a.name}</p>
                          <p className="text-sm text-gray-400">When {a.condition} > {a.threshold}%</p>
                        </div>
                        <button onClick={() => deleteAlert(a.id)} className="text-red-400 hover:text-red-300">🗑️</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </Modal>

            {/* Reports Modal */}
            <Modal open={showReports} onClose={() => setShowReports(false)} title="📄 Generate Report">
              <div className="space-y-4">
                <p className="text-gray-300">Generate a comprehensive report of your portfolio performance.</p>
                <button onClick={generateReport} className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-medium">📥 Download Report</button>
              </div>
            </Modal>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FinancialDashboard />);
  </script>
</body>
</html>
